<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 190px;
      background: #ffffff;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #6366f1;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 3px;
    }

    .main {
      padding: 14px 16px;
    }

    #panel-btn {
      width: 100%;
      padding: 12px 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 3px 14px rgba(99,102,241,0.4);
      margin-bottom: 10px;
    }

    #panel-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 20px rgba(99,102,241,0.55);
    }

    #panel-btn.active {
      background: linear-gradient(135deg, #ef4444, #f97316);
      box-shadow: 0 3px 14px rgba(239,68,68,0.4);
    }

    .status {
      font-size: 11px;
      color: #9ca3af;
      min-height: 14px;
      line-height: 1.4;
      text-align: center;
    }

    .status.on   { color: #6366f1; }
    .status.done { color: #10b981; }
    .status.err  { color: #ef4444; }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 10px 0;
    }

    .server-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }

    .dot.online  { background: #10b981; }
    .dot.offline { background: #d1d5db; }

    .server-label {
      font-size: 10px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">THIS</div>
    <div class="subtitle">요소 선택 → 코드 자동 수정</div>
  </div>

  <div class="main">
    <button id="panel-btn">패널 열기</button>
    <div class="status" id="status"> </div>

    <div class="divider"></div>

    <div class="server-row">
      <div class="dot" id="server-dot"></div>
      <span class="server-label" id="server-label">서버 확인 중...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
