<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 200px;
      background: #0f0f1a;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    .header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid #1e1e30;
    }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #6366f1;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 10px;
      color: #3d3d5c;
      margin-top: 3px;
    }

    .main {
      padding: 16px;
    }

    #pick-btn {
      width: 100%;
      padding: 18px 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 6px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.45);
    }

    #pick-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 28px rgba(99, 102, 241, 0.6);
    }

    #pick-btn.active {
      background: linear-gradient(135deg, #ef4444, #f97316);
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.5);
      letter-spacing: 2px;
      font-size: 16px;
    }

    .status {
      margin-top: 12px;
      font-size: 11px;
      text-align: center;
      color: #3d3d5c;
      min-height: 16px;
      line-height: 1.4;
    }

    .status.on {
      color: #f97316;
    }

    .status.sent {
      color: #10b981;
    }

    .divider {
      height: 1px;
      background: #1e1e30;
      margin: 12px 0;
    }

    .server-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 2px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #374151;
      flex-shrink: 0;
    }

    .dot.online { background: #10b981; }
    .dot.offline { background: #374151; }

    .server-label {
      font-size: 10px;
      color: #3d3d5c;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">THIS</div>
    <div class="subtitle">요소 선택 → Claude Code 전달</div>
  </div>

  <div class="main">
    <button id="pick-btn">THIS</button>
    <div class="status" id="status">클릭하여 요소 선택 시작</div>

    <div class="divider"></div>

    <div class="server-row">
      <div class="dot" id="server-dot"></div>
      <span class="server-label" id="server-label">서버 확인 중...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
